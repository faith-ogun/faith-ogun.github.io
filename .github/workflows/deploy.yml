# Builds the Astro site and deploys it to GitHub Pages.
#
# NOTE: This does nothing until GitHub Pages "Source" is switched to
# "GitHub Actions" in repo Settings → Pages. Until then, the live site keeps
# serving the legacy index.html from the branch. That switch is the deliberate
# CUTOVER step we'll do together after the rebrand is approved.
#
# It is also gated to the `main` branch, so work on `rebrand` never deploys.
name: Deploy site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
