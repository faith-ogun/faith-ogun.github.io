<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Voxelomics project visual</title>
  <desc id="desc">Abstract visual for Voxelomics, an offline-first clinical MDT copilot.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1323"/>
      <stop offset="50%" stop-color="#14315f"/>
      <stop offset="100%" stop-color="#2a4ea2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7ec3ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#9ca7ff" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="930" cy="150" r="110" fill="#7ec3ff" opacity="0.12"/>
  <circle cx="230" cy="650" r="180" fill="#9ca7ff" opacity="0.12"/>
  <g opacity="0.75">
    <rect x="210" y="180" width="780" height="430" rx="28" fill="#0e1e3f" stroke="#8cb7ff" stroke-opacity="0.35"/>
    <rect x="250" y="220" width="360" height="70" rx="12" fill="#132a53" stroke="#8cb7ff" stroke-opacity="0.25"/>
    <rect x="250" y="320" width="700" height="35" rx="10" fill="#173567"/>
    <rect x="250" y="375" width="610" height="35" rx="10" fill="#173567"/>
    <rect x="250" y="430" width="540" height="35" rx="10" fill="#173567"/>
    <rect x="250" y="485" width="450" height="35" rx="10" fill="#173567"/>
  </g>
  <g>
    <path d="M700 130L1060 130" stroke="url(#glow)" stroke-width="12" stroke-linecap="round" filter="url(#blur)" opacity="0.75"/>
    <path d="M140 640L500 640" stroke="url(#glow)" stroke-width="10" stroke-linecap="round" filter="url(#blur)" opacity="0.65"/>
  </g>
  <g font-family="Space Grotesk, system-ui, sans-serif" text-anchor="middle">
    <text x="600" y="675" fill="#dbe8ff" font-size="56" font-weight="700" letter-spacing="4">VOXELOMICS</text>
    <text x="600" y="720" fill="#9ec0ff" font-size="24" letter-spacing="2">OFFLINE-FIRST CLINICAL MDT COPILOT</text>
  </g>
</svg>
